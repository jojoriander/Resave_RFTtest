<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Resave · Demo</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
/* ── CANVAS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; }

body {
  min-height: 100vh;
  background-color: #f5f0eb;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 40px 20px 60px;
  font-family: 'Satoshi', -apple-system, 'PingFang SC', sans-serif;
}

.demo-label {
  font-size: 11px;
  color: #b8b0a8;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 24px;
  font-weight: 500;
}

/* ── PHONE OUTER SHELL ── */
.phone-shell {
  position: relative;
  width: 393px;
  flex-shrink: 0;
}
/* Side buttons */
.btn-silent, .btn-vol-up, .btn-vol-dn, .btn-power {
  position: absolute;
  background: #252525;
  box-shadow: -1px 0 0 #111;
  z-index: 15;
  pointer-events: none;
  border-radius: 3px 0 0 3px;
}
.btn-silent  { left: -5px; top: 124px; width: 5px; height: 32px; }
.btn-vol-up  { left: -5px; top: 176px; width: 5px; height: 68px; }
.btn-vol-dn  { left: -5px; top: 260px; width: 5px; height: 68px; }
.btn-power   { right: -5px; top: 172px; width: 5px; height: 76px; border-radius: 0 3px 3px 0; box-shadow: 1px 0 0 #111; }

/* ── PHONE BODY ── */
.phone {
  width: 393px;
  height: 852px;
  background: #f5f5f5;
  border-radius: 50px;
  box-shadow:
    0 0 0 12px #1a1a1a,
    0 0 0 13px #111,
    0 0 0 14px rgba(255,255,255,0.06),
    0 40px 100px rgba(0,0,0,0.45),
    0 15px 40px rgba(0,0,0,0.25);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Dynamic Island */
.phone::before {
  content: '';
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 118px; height: 34px;
  background: #111;
  border-radius: 20px;
  z-index: 100;
}

/* Home indicator */
.phone::after {
  content: '';
  position: absolute;
  bottom: 10px; left: 50%;
  transform: translateX(-50%);
  width: 126px; height: 5px;
  background: rgba(0,0,0,0.2);
  border-radius: 3px;
  z-index: 100;
  pointer-events: none;
}

.demo-tagline {
  margin-top: 24px;
  font-size: 12px;
  color: #c8c0b8;
  letter-spacing: 0.04em;
}

/* ── TOKENS ── */
:root {
  --red: #FF2442;
  --red-light: #fff0f2;
  --red-mid: #ffe0e4;
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-2: #fafafa;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a1a;
  --text-muted: #888;
  --text-faint: #bbb;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --ease: cubic-bezier(0.16,1,0.3,1);
  --font: 'Satoshi', -apple-system, 'PingFang SC', sans-serif;
}

img,svg{display:block;max-width:100%}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input{font:inherit;color:inherit}

/* ── STATUS BAR ── */
.status-bar {
  height: 44px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 20px 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  flex-shrink: 0;
}
.status-bar .time { margin-left: 28px; }
.status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 10px; }

/* ── NAV HEADER ── */
.nav-header {
  padding: 10px 16px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-header .title { font-size: 17px; font-weight: 700; }
.nav-header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.nav-icon-btn {
  width: 32px; height: 32px;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: background 120ms;
}
.nav-icon-btn:hover { background: var(--bg); }

/* ── SCROLLABLE CONTENT ── */
.page-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.page-content::-webkit-scrollbar { display: none; }

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  padding: 10px 0 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  text-align: center;
  position: relative;
  transition: color 150ms;
}
.tab-btn.active { color: var(--red); font-weight: 700; }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 20%; right: 20%;
  height: 2px;
  background: var(--red);
  border-radius: 2px 2px 0 0;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  height: 56px;
  display: flex;
  align-items: center;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 0 8px;
  flex-shrink: 0;
}
.bottom-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 0;
  color: var(--text-faint);
  font-size: 10px;
  transition: color 150ms;
}
.bottom-nav-item.active { color: var(--red); }
.bottom-nav-icon { font-size: 20px; line-height: 1; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 12px;
  box-shadow: var(--shadow-sm);
}

/* ── AI BANNER / SUGGESTION ── */
.ai-suggestion {
  margin: 10px 12px 0;
  background: linear-gradient(135deg, #fff5f6 0%, #fff0f3 100%);
  border: 1px solid var(--red-mid);
  border-radius: var(--radius-md);
  padding: 12px;
  position: relative;
}
.ai-suggestion .ai-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.ai-badge {
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-full);
  letter-spacing: 0.3px;
}
.ai-suggestion .ai-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 8px;
}
.ai-suggestion .ai-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.ai-actions {
  display: flex;
  gap: 8px;
}
.btn-primary {
  flex: 1;
  height: 34px;
  background: var(--red);
  color: #fff;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: opacity 150ms, transform 100ms;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { opacity: 0.85; transform: scale(0.98); }
.btn-ghost {
  height: 34px;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  font-size: 13px;
  color: var(--text-muted);
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  transition: background 150ms;
}
.btn-ghost:active { background: var(--bg); }

/* ── POSTS GRID ── */
.posts-grid {
  padding: 10px 12px 12px;
  columns: 2;
  column-gap: 8px;
}
.post-card {
  break-inside: avoid;
  margin-bottom: 8px;
  background: var(--surface);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 150ms var(--ease), box-shadow 150ms;
  -webkit-tap-highlight-color: transparent;
  display: block;
}
.post-card:active { transform: scale(0.97); box-shadow: none; }
.post-cover {
  width: 100%;
  aspect-ratio: 3/4;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  line-height: 1.4;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.post-cover-label {
  position: relative;
  z-index: 1;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
.post-info { padding: 8px 8px 10px; }
.post-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 6px;
  min-height: 33px;
}
.post-author {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}
.post-author::before {
  content: '';
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

/* ── ALBUM CARD ── */
.album-card {
  margin: 8px 12px 0;
  background: var(--surface);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 150ms var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.album-card:active { transform: scale(0.98); }
.album-cover-strip {
  height: 80px;
  display: flex;
  overflow: hidden;
}
.album-cover-strip > div { flex: 1; }
.album-card-body {
  padding: 10px 12px 12px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.album-card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}
.album-card-meta { font-size: 11px; color: var(--text-muted); }
.album-ai-tag {
  font-size: 10px;
  font-weight: 600;
  color: var(--red);
  background: var(--red-light);
  border: 1px solid var(--red-mid);
  padding: 3px 8px;
  border-radius: var(--radius-full);
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 8px;
  margin-top: 2px;
}

/* ── THEME PAGE ── */
.theme-header {
  padding: 14px 14px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.theme-back-btn {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: var(--text-muted);
  margin-bottom: 8px;
  padding: 2px 0;
}
.theme-back-btn svg { width:16px;height:16px; }
.theme-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.theme-meta { font-size: 12px; color: var(--text-muted); }

/* ── AI SUMMARY BOX ── */
.ai-summary-box {
  margin: 10px 12px 0;
  background: linear-gradient(135deg, #fff8f8 0%, #fff5f6 100%);
  border: 1px solid var(--red-mid);
  border-radius: var(--radius-md);
  padding: 12px;
}
.ai-summary-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.ai-summary-title { font-size: 12px; font-weight: 700; color: var(--text); }
.ai-summary-text {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 10px;
}
.ai-actions-list {
  border-top: 1px solid var(--red-mid);
  padding-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ai-action-item {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  font-size: 12px;
  color: var(--text);
  line-height: 1.5;
}
.ai-action-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ── SUBTOPIC CHIPS ── */
.chips-row {
  display: flex;
  gap: 6px;
  padding: 10px 12px 4px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 5px 12px;
  border-radius: var(--radius-full);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 150ms;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.chip.active { background: var(--red); border-color: var(--red); color: #fff; }

/* ── SEARCH ── */
.search-container { padding: 10px 12px 6px; }
.search-box {
  display: flex;
  align-items: center;
  background: var(--bg);
  border-radius: var(--radius-full);
  padding: 0 12px;
  gap: 8px;
  border: 1.5px solid transparent;
  transition: border-color 150ms, background 150ms;
}
.search-box:focus-within { background: var(--surface); border-color: var(--red); }
.search-box svg { color: var(--text-faint); flex-shrink: 0; }
.search-input {
  flex: 1;
  border: none;
  background: transparent;
  height: 36px;
  font-size: 13px;
  outline: none;
}
.search-input::placeholder { color: var(--text-faint); }
.search-suggestions {
  display: flex;
  gap: 6px;
  padding: 6px 12px 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.search-suggestions::-webkit-scrollbar { display: none; }
.suggestion-chip {
  padding: 4px 10px;
  border-radius: var(--radius-full);
  font-size: 11px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 150ms;
}
.suggestion-chip:active { background: var(--red-light); border-color: var(--red-mid); color: var(--red); }

/* ── SEARCH RESULTS ── */
.search-result-card {
  margin: 0 12px 8px;
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  box-shadow: var(--shadow-sm);
  border-left: 3px solid transparent;
}
.search-result-card.matched { border-left-color: var(--red); }
.search-result-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.search-result-snippet { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-bottom: 5px; }
.search-match-reason {
  font-size: 11px;
  color: var(--red);
  display: flex;
  align-items: flex-start;
  gap: 4px;
}

/* ── LOADING OVERLAY ── */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 200;
  border-radius: 50px;
  backdrop-filter: blur(4px);
}
.loading-spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--red-mid);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; font-weight: 600; color: var(--text); }
.loading-steps { display: flex; flex-direction: column; gap: 8px; text-align: center; }
.loading-step {
  font-size: 12px;
  color: var(--text-faint);
  opacity: 0;
  transition: opacity 300ms, color 300ms;
}
.loading-step.visible { opacity: 1; }
.loading-step.done { color: var(--red); }

/* ── TOAST ── */
.toast {
  position: absolute;
  top: 54px; left: 12px; right: 12px;
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  z-index: 300;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transform: translateY(-8px);
  opacity: 0;
  transition: transform 300ms var(--ease), opacity 300ms;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-icon { font-size: 20px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
.toast-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.toast-sub { font-size: 11px; color: var(--text-muted); }

/* ── WELCOME MODAL ── */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 400;
  display: flex;
  align-items: flex-end;
  border-radius: 50px;
  overflow: hidden;
  opacity: 0;
  transition: opacity 250ms;
}
.modal-overlay.show { opacity: 1; }
.modal-sheet {
  width: 100%;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 32px;
  transform: translateY(100%);
  transition: transform 350ms var(--ease);
}
.modal-overlay.show .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }
.modal-stat-row { display: flex; gap: 8px; margin-bottom: 16px; }
.modal-stat {
  flex: 1;
  background: var(--bg);
  border-radius: var(--radius-md);
  padding: 12px 10px;
  text-align: center;
}
.modal-stat-num { font-size: 22px; font-weight: 700; color: var(--red); line-height: 1; }
.modal-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.modal-cta {
  width: 100%; height: 44px;
  background: var(--red);
  color: #fff;
  border-radius: var(--radius-full);
  font-size: 15px;
  font-weight: 700;
  transition: opacity 150ms;
}
.modal-cta:active { opacity: 0.85; }

/* ── EMPTY STATE ── */
.empty-albums { padding: 40px 20px; text-align: center; color: var(--text-faint); }
.empty-albums .emoji { font-size: 36px; margin-bottom: 10px; }
.empty-albums p { font-size: 13px; }

/* ── SECTION LABEL ── */
.section-label { padding: 12px 14px 4px; font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.3px; }

/* PAGE TRANSITIONS */
.page-screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.page-screen.active { display: flex; }

/* ── SCROLL AREAS ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll-area::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<p class="demo-label">Product Demo &nbsp;·&nbsp; Resave</p>

<div class="phone-shell">
  <div class="btn-silent"></div>
  <div class="btn-vol-up"></div>
  <div class="btn-vol-dn"></div>
  <div class="btn-power"></div>

<div class="phone" id="phone">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="time" id="clock">9:41</span>
    <div class="icons">
